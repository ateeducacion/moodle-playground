name: PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - name: Install dependencies
        run: npm install

      - name: Generate build metadata
        run: npm run build:version

      - name: Restore snapshot cache
        uses: actions/cache@v4
        with:
          path: .cache/snapshots
          key: snapshots-${{ hashFiles('patches/**', 'scripts/generate-install-snapshot.sh', 'scripts/patch-moodle-source.sh', 'scripts/generate-component-cache.php') }}
          restore-keys: |
            snapshots-

      - name: Build worker bundle
        run: npm run build:worker

      - name: Build Moodle bundle (single branch)
        run: make bundle BRANCH=MOODLE_500_STABLE

      - name: Assemble preview artifact
        run: |
          rm -rf dist-preview
          mkdir -p dist-preview
          rsync -a ./ ./dist-preview/ \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".venv/" \
            --exclude ".cache/" \
            --exclude "dist-preview/" \
            --exclude "docs/" \
            --exclude "node_modules/" \
            --exclude "site/" \
            --exclude "tests/" \
            --exclude "patches/" \
            --exclude "scripts/"
          # Remove VFS binaries to reduce deploy size (~376MB savings)
          find dist-preview/assets/moodle -name "*.vfs.bin" -delete 2>/dev/null || true
          find dist-preview/assets/moodle -name "*.vfs.index.json" -delete 2>/dev/null || true

      - name: Strip VFS from manifests
        run: |
          node -e "
            const fs = require('fs');
            for (const f of [
              'dist-preview/assets/manifests/MOODLE_500_STABLE.json',
              'dist-preview/assets/manifests/latest.json'
            ]) {
              if (fs.existsSync(f)) {
                const m = JSON.parse(fs.readFileSync(f, 'utf8'));
                delete m.vfs;
                fs.writeFileSync(f, JSON.stringify(m, null, 2) + '\n');
              }
            }
          "

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Prepare preview validation outputs
        run: |
          rm -rf playwright-artifacts
          mkdir -p playwright-artifacts/pr-preview-chromium
          mkdir -p playwright-artifacts/pr-preview-firefox

      - name: Validate preview build in Chromium
        id: validate_chromium
        continue-on-error: true
        env:
          PLAYWRIGHT_WEB_ROOT: dist-preview
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173/
          PLAYWRIGHT_SERVER_LOG: playwright-artifacts/pr-preview-chromium/server.log
          PLAYWRIGHT_OUTPUT_DIR: playwright-artifacts/pr-preview-chromium/test-results
          PLAYWRIGHT_REPORT_DIR: playwright-artifacts/pr-preview-chromium/playwright-report
          PLAYWRIGHT_WORKFLOW_LABEL: pr-preview
        run: npx playwright test --project=chromium

      - name: Validate preview build in Firefox
        id: validate_firefox
        if: always()
        continue-on-error: true
        env:
          PLAYWRIGHT_WEB_ROOT: dist-preview
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173/
          PLAYWRIGHT_SERVER_LOG: playwright-artifacts/pr-preview-firefox/server.log
          PLAYWRIGHT_OUTPUT_DIR: playwright-artifacts/pr-preview-firefox/test-results
          PLAYWRIGHT_REPORT_DIR: playwright-artifacts/pr-preview-firefox/playwright-report
          PLAYWRIGHT_WORKFLOW_LABEL: pr-preview
        run: npx playwright test --project=firefox

      - name: Upload Chromium Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-pr-preview-chromium
          path: playwright-artifacts/pr-preview-chromium
          if-no-files-found: warn

      - name: Upload Firefox Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-pr-preview-firefox
          path: playwright-artifacts/pr-preview-firefox
          if-no-files-found: warn

      - name: Enforce browser validation success
        if: always()
        run: |
          if [ "${{ steps.validate_chromium.outcome }}" != "success" ] || [ "${{ steps.validate_firefox.outcome }}" != "success" ]; then
            echo "Browser validation failed."
            echo "Chromium: ${{ steps.validate_chromium.outcome }}"
            echo "Firefox: ${{ steps.validate_firefox.outcome }}"
            exit 1
          fi

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./dist-preview
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}"
          alias: pr-${{ github.event.pull_request.number }}
          enable-pull-request-comment: true
          enable-commit-comment: false
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Netlify deploy
        run: |
          npm i -g netlify-cli
          # Find the deploy by alias and delete it
          DEPLOY_ID=$(netlify api listSiteDeploys \
            --data '{"site_id":"'"$NETLIFY_SITE_ID"'"}' 2>/dev/null \
            | jq -r '.[] | select(.deploy_ssl_url | test("pr-${{ github.event.pull_request.number }}--")) | .id' \
            | head -n 1) || true
          if [ -n "$DEPLOY_ID" ]; then
            netlify api deleteDeploy --data '{"deploy_id":"'"$DEPLOY_ID"'"}' || true
            echo "Deleted deploy $DEPLOY_ID"
          else
            echo "No deploy found for pr-${{ github.event.pull_request.number }}, skipping"
          fi
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
