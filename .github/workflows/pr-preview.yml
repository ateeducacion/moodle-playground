name: PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - name: Install dependencies
        run: npm install

      - name: Generate build metadata
        run: npm run build:version

      - name: Restore snapshot cache
        uses: actions/cache@v5
        with:
          path: .cache/snapshots
          key: snapshots-${{ hashFiles('patches/**', 'scripts/generate-install-snapshot.sh', 'scripts/patch-moodle-source.sh', 'scripts/generate-component-cache.php') }}
          restore-keys: |
            snapshots-

      - name: Build worker bundle
        run: npm run build:worker

      - name: Build Moodle bundle (single branch)
        run: make bundle BRANCH=MOODLE_500_STABLE

      - name: Assemble preview artifact
        run: |
          rm -rf dist-preview
          mkdir -p dist-preview
          rsync -a ./ ./dist-preview/ \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".venv/" \
            --exclude ".cache/" \
            --exclude "dist-preview/" \
            --exclude "docs/" \
            --exclude "node_modules/" \
            --exclude "site/" \
            --exclude "tests/" \
            --exclude "patches/" \
            --exclude "scripts/"

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-artifact
          path: dist-preview/
          retention-days: 1

  browser-validation:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: build-preview
    strategy:
      matrix:
        browser: [chromium]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Download preview artifact
        uses: actions/download-artifact@v4
        with:
          name: preview-artifact
          path: dist-preview

      - name: Run Playwright e2e tests
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          CI: "true"
          PLAYWRIGHT_WEB_ROOT: dist-preview
          PLAYWRIGHT_EXTERNAL_SERVER: "0"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-preview-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: [build-preview, browser-validation]
    steps:
      - name: Download preview artifact
        uses: actions/download-artifact@v4
        with:
          name: preview-artifact
          path: dist-preview

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./dist-preview
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}"
          alias: pr-${{ github.event.pull_request.number }}
          enable-pull-request-comment: true
          enable-commit-comment: false
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Netlify deploy
        run: |
          npm i -g netlify-cli
          # Find the deploy by alias and delete it
          DEPLOY_ID=$(netlify api listSiteDeploys \
            --data '{"site_id":"'"$NETLIFY_SITE_ID"'"}' 2>/dev/null \
            | jq -r '.[] | select(.deploy_ssl_url | test("pr-${{ github.event.pull_request.number }}--")) | .id' \
            | head -n 1) || true
          if [ -n "$DEPLOY_ID" ]; then
            netlify api deleteDeploy --data '{"deploy_id":"'"$DEPLOY_ID"'"}' || true
            echo "Deleted deploy $DEPLOY_ID"
          else
            echo "No deploy found for pr-${{ github.event.pull_request.number }}, skipping"
          fi
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
