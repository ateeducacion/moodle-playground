name: PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - name: Install dependencies
        run: npm install

      - name: Generate build metadata
        run: npm run build:version

      - name: Restore snapshot cache
        uses: actions/cache@v4
        with:
          path: .cache/snapshots
          key: snapshots-${{ hashFiles('patches/**', 'scripts/generate-install-snapshot.sh', 'scripts/patch-moodle-source.sh', 'scripts/generate-component-cache.php') }}
          restore-keys: |
            snapshots-

      - name: Build worker bundle
        run: npm run build:worker

      - name: Build Moodle bundle (single branch)
        run: make bundle BRANCH=MOODLE_500_STABLE

      - name: Assemble preview artifact
        run: ./scripts/prepare-e2e-artifact.sh preview

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-site
          path: dist-preview

  browser-validation:
    if: github.event.action != 'closed'
    needs: build-preview
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            make_target: test-e2e-chrome
          - browser: firefox
            make_target: test-e2e-firefox
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Download preview artifact
        uses: actions/download-artifact@v4
        with:
          name: preview-site
          path: dist-preview

      - name: Validate preview build in ${{ matrix.browser }}
        env:
          E2E_ARTIFACT: preview
          E2E_REUSE_ARTIFACT: 1
          E2E_OUTPUT_PREFIX: pr-preview
          E2E_WORKFLOW_LABEL: pr-preview
        run: make ${{ matrix.make_target }}

      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-pr-preview-${{ matrix.browser }}
          path: playwright-artifacts/pr-preview-${{ matrix.browser }}
          if-no-files-found: warn

  deploy-preview:
    if: github.event.action != 'closed'
    needs:
      - build-preview
      - browser-validation
    runs-on: ubuntu-latest
    steps:
      - name: Download preview artifact
        uses: actions/download-artifact@v4
        with:
          name: preview-site
          path: dist-preview

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./dist-preview
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}"
          alias: pr-${{ github.event.pull_request.number }}
          enable-pull-request-comment: true
          enable-commit-comment: false
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Netlify deploy
        run: |
          npm i -g netlify-cli
          # Find the deploy by alias and delete it
          DEPLOY_ID=$(netlify api listSiteDeploys \
            --data '{"site_id":"'"$NETLIFY_SITE_ID"'"}' 2>/dev/null \
            | jq -r '.[] | select(.deploy_ssl_url | test("pr-${{ github.event.pull_request.number }}--")) | .id' \
            | head -n 1) || true
          if [ -n "$DEPLOY_ID" ]; then
            netlify api deleteDeploy --data '{"deploy_id":"'"$DEPLOY_ID"'"}' || true
            echo "Deleted deploy $DEPLOY_ID"
          else
            echo "No deploy found for pr-${{ github.event.pull_request.number }}, skipping"
          fi
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
