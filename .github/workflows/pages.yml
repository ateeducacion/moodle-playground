name: Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/configure-pages@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - name: Install dependencies
        run: npm install

      - name: Restore snapshot cache
        uses: actions/cache@v4
        with:
          path: .cache/snapshots
          key: snapshots-${{ hashFiles('patches/**', 'scripts/generate-install-snapshot.sh', 'scripts/patch-moodle-source.sh', 'scripts/generate-component-cache.php') }}
          restore-keys: |
            snapshots-

      - name: Prepare runtime assets
        run: make prepare-all JOBS=2

      - name: Install docs dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Assemble Pages artifact
        run: |
          rm -rf dist-pages
          mkdir -p dist-pages/docs
          rsync -a ./ ./dist-pages/ \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".venv/" \
            --exclude ".cache/" \
            --exclude "dist-pages/" \
            --exclude "docs/" \
            --exclude "node_modules/" \
            --exclude "site/"
          mkdocs build --strict --site-dir dist-pages/docs
          touch dist-pages/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
