name: Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/configure-pages@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - name: Install dependencies
        run: npm install

      - name: Generate build metadata
        run: npm run build:version

      - name: Restore snapshot cache
        uses: actions/cache@v4
        with:
          path: .cache/snapshots
          key: snapshots-${{ hashFiles('patches/**', 'scripts/generate-install-snapshot.sh', 'scripts/patch-moodle-source.sh', 'scripts/generate-component-cache.php') }}
          restore-keys: |
            snapshots-

      - name: Prepare runtime assets
        run: make prepare-all JOBS=2

      - name: Install docs dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Assemble Pages artifact
        run: ./scripts/prepare-e2e-artifact.sh pages

      - name: Upload Pages E2E root
        uses: actions/upload-artifact@v4
        with:
          name: pages-e2e-root
          path: validate-root

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist-pages

  browser-validation:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            make_target: test-e2e-chrome
          - browser: firefox
            make_target: test-e2e-firefox
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Download Pages E2E root
        uses: actions/download-artifact@v4
        with:
          name: pages-e2e-root
          path: validate-root

      - name: Validate Pages build in ${{ matrix.browser }}
        env:
          E2E_ARTIFACT: pages
          E2E_REUSE_ARTIFACT: 1
          E2E_OUTPUT_PREFIX: pages
          E2E_WORKFLOW_LABEL: pages
        run: make ${{ matrix.make_target }}

      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-pages-${{ matrix.browser }}
          path: playwright-artifacts/pages-${{ matrix.browser }}
          if-no-files-found: warn

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs:
      - build
      - browser-validation
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
