name: Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Fast lint + unit tests (parallel with build) ──
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate build metadata
        run: npm run build:version

      - name: Run unit tests
        run: make test

      - name: Lint
        run: make lint

  # ── Full build: all 5 branches + docs ──
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/configure-pages@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - name: Install dependencies
        run: npm install

      - name: Generate build metadata
        run: npm run build:version

      - name: Restore snapshot cache
        uses: actions/cache@v5
        with:
          path: .cache/snapshots
          key: snapshots-${{ hashFiles('patches/**', 'scripts/generate-install-snapshot.sh', 'scripts/patch-moodle-source.sh', 'scripts/generate-component-cache.php') }}
          restore-keys: |
            snapshots-

      - name: Prepare runtime assets
        run: make prepare-all JOBS=2

      - name: Install docs dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Assemble Pages artifact
        run: |
          rm -rf dist-pages
          mkdir -p dist-pages/docs
          rsync -a ./ ./dist-pages/ \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".venv/" \
            --exclude ".cache/" \
            --exclude "dist-pages/" \
            --exclude "docs/" \
            --exclude "node_modules/" \
            --exclude "site/"
          mkdocs build --strict --site-dir dist-pages/docs
          touch dist-pages/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist-pages

  # ── Browser validation: chromium + firefox in parallel ──
  browser-validation:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Download Pages artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: dist-pages-artifact

      - name: Extract Pages artifact
        run: |
          mkdir -p dist-pages-validate
          tar -xf dist-pages-artifact/artifact.tar -C dist-pages-validate

      - name: Run Playwright e2e tests
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          CI: "true"
          PLAYWRIGHT_WEB_ROOT: dist-pages-validate
          PLAYWRIGHT_EXTERNAL_SERVER: "0"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-pages-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

  # ── Deploy: gates on ALL jobs ──
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [build, lint-and-test, browser-validation]
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
